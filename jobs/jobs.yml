kind: Job
apiVersion: batch/v1
metadata:
  name: test-job
  namespace: nginx

spec:
  completions: 1
  parallelism: 1
  template:
    metadata:
      name: test-job-pod
      labels:
        app: batch-task

    spec:
      containers:
        - name: batch-container
          image: busybox:latest
          command: ["sh", "-c", "echo Hello world.....! && sleep 30"]

      restartPolicy: Never

